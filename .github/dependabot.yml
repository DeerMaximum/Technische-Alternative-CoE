version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: daily
    ignore:
      dependency-type: all
      update-types: ["version-update:semver-patch"]
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: daily
    ignore:
      dependency-type: all
      update-types: ["version-update:semver-patch"]
      
